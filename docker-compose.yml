services:
  mongo:
    image: mongo:7
    container_name: tasopensid-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            rs.status().ok === 1
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok === 1
          }
        "
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s
    volumes:
      - tasopensid-mongo-data:/data/db

volumes:
  tasopensid-mongo-data:

# Node.js Vue.js CI/CD configuration
image: node:20

# Cache node_modules between jobs
cache:
  paths:
    - node_modules/

stages:
  - install
  - test
  - build
  - deploy

# Install dependencies
install:
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/

# Run tests (if you add tests later)
test:
  stage: test
  script:
    - npm run build
    - echo "Add your test commands here"

# Build the application
build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Deploy to Azure Blob Storage (static website)
deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  only:
    - main
  script:
    - apk add --no-cache nodejs npm
    - npm ci
    - npm run build
    - az storage blob upload-batch
        --account-name stvuebilling28691
        --destination '$web'
        --source dist/
        --overwrite true
        --account-key $AZURE_STORAGE_KEY
        --output none
  environment:
    name: production
    url: https://stvuebilling28691.z6.web.core.windows.net
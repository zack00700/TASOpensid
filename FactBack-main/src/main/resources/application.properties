# ===== Outbox Scheduler =====
# Set to a duration (e.g. "30s") to enable, or "off" to disable entirely.
# Enable only when an EventHub/Kafka integration is ready.
app.outbox.poll-interval=off

# ===== Demurrage & Detention Scheduler =====
# Set to a cron expression (e.g. "0 0 2 * * ?") to enable, or "off" to disable
app.dd.scheduler.cron=off
app.dd.free-days-expiry-alert-days=3

# ===== Server =====
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

# IMPORTANT: quarkus.http.root-path is a BUILD-TIME property and CANNOT be changed at runtime
# If you need to mount all REST endpoints under /api, uncomment below and rebuild the application
# Do NOT set this via environment variables at runtime - it will be ignored and cause warnings
# quarkus.http.root-path=/api

# ===== MongoDB (via App Settings -> Key Vault references) =====
quarkus.mongodb.connection-string=${MONGODB_URI}
quarkus.mongodb.database=${MONGODB_DATABASE}
quarkus.mongodb.uuid-representation=standard

# ===== MongoDB Local =====
# Disable retryable writes and read concern for standalone MongoDB in dev mode
%dev.quarkus.mongodb.connection-string=mongodb://localhost:27017/?retryWrites=false
%dev.quarkus.mongodb.database=tos3d
quarkus.mongodb.devservices.enabled=false

# ===== MongoDB Test (DevServices) =====
%test.quarkus.mongodb.connection-string=mongodb://localhost:27017
%test.quarkus.mongodb.database=testdb
%test.quarkus.mongodb.devservices.enabled=true
%test.quarkus.mongodb.devservices.image-name=mongo:7

# ===== CORS =====
quarkus.http.cors=true
# Allow only your SPA origin in prod; override during dev
quarkus.http.cors.origins=https://stvuebilling28691.z6.web.core.windows.net
%dev.quarkus.http.cors.origins=${ALLOWED_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,request-id,request-context,traceparent,tracestate
quarkus.http.cors.credentials=true
quarkus.http.cors.access-control-max-age=3600
quarkus.http.cors.exposed-headers=Content-Type,Authorization,Content-Length


# ===== Logging =====
# Root log level
quarkus.log.level=INFO

# Console logging format (JSON for production, pretty for dev)
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Category-specific log levels
quarkus.log.category."fr.alb".level=INFO
%dev.quarkus.log.category."fr.alb".level=DEBUG

# MongoDB logging
quarkus.log.category."org.mongodb.driver".level=WARN
%dev.quarkus.log.category."org.mongodb.driver".level=INFO

# HTTP request/response logging
quarkus.log.category."io.quarkus.http.access-log".level=INFO
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=combined
%dev.quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b "%{i,Referer}" "%{i,User-Agent}" %D

# Security/Auth logging
quarkus.log.category."io.quarkus.oidc".level=INFO
%dev.quarkus.log.category."io.quarkus.oidc".level=DEBUG
quarkus.log.category."io.quarkus.security".level=INFO
%dev.quarkus.log.category."io.quarkus.security".level=DEBUG

# REST client logging
quarkus.log.category."org.jboss.resteasy.reactive.client".level=WARN
%dev.quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG

# File logging (for local development and debugging)
%dev.quarkus.log.file.enable=true
%dev.quarkus.log.file.path=logs/application.log
%dev.quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
%dev.quarkus.log.file.rotation.max-file-size=10M
%dev.quarkus.log.file.rotation.max-backup-index=5
%dev.quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# Async logging for better performance
quarkus.log.console.async=true
quarkus.log.console.async.queue-length=512
quarkus.log.console.async.overflow=block



# ===== Health & OpenAPI / Swagger =====
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger
quarkus.swagger-ui.always-include=true

%dev.quarkus.smallrye-openapi.path=/openapi
%dev.quarkus.swagger-ui.path=/swagger-ui
%dev.quarkus.swagger-ui.always-include=true

# ===== Metrics & Monitoring =====
# Enable metrics endpoint
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# HTTP metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.http-client.enabled=true

# JVM metrics
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true

# Note: MongoDB metrics are automatically enabled when both
# quarkus-micrometer-registry-prometheus and quarkus-mongodb-client are present

# Custom metrics tags (for filtering in monitoring tools)
quarkus.micrometer.binder.http-server.match-patterns=/api/.*=/api/{path}
quarkus.application.name=factback-api
quarkus.application.version=1.0.0

# ===== Cache =====
# event-cache: EventConfig entries (rarely change, read on every event serialization)
quarkus.cache.caffeine."event-cache".expire-after-write=1H
quarkus.cache.caffeine."event-cache".maximum-size=500

# active-contracts: list of ACTIVE contracts (read on every invoice generation)
quarkus.cache.caffeine."active-contracts".expire-after-write=5M
quarkus.cache.caffeine."active-contracts".maximum-size=10

# active-tariffs: master tariff schedules (low cardinality, changes rarely)
quarkus.cache.caffeine."active-tariffs".expire-after-write=10M
quarkus.cache.caffeine."active-tariffs".maximum-size=50

# payments: payment records (moderate cardinality, refreshed on write operations)
quarkus.cache.caffeine."payments".expire-after-write=1M

# ===== MongoDB Connection Pool =====
quarkus.mongodb.max-pool-size=50
quarkus.mongodb.min-pool-size=5
quarkus.mongodb.max-wait-queue-size=500
quarkus.mongodb.connect-timeout=5000
quarkus.mongodb.server-selection-timeout=5000
%dev.quarkus.mongodb.max-pool-size=10

# ===== Thread Pool =====
quarkus.thread-pool.max-threads=200
quarkus.thread-pool.min-threads=10
quarkus.thread-pool.queue-size=1000

# ===== Timezone =====
app.timezone=Europe/Paris

# ===== OIDC / Azure AD Authentication =====
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=https://login.microsoftonline.com/17a64cff-61e7-4589-bbe0-c0989d8f625c/v2.0
quarkus.oidc.client-id=7e6ac0af-7c14-4469-8dcc-925924ef3c97
quarkus.oidc.application-type=service

# Token validation
quarkus.oidc.token.issuer=https://sts.windows.net/17a64cff-61e7-4589-bbe0-c0989d8f625c/
quarkus.oidc.token.audience=api://7e6ac0af-7c14-4469-8dcc-925924ef3c97

# CRITICAL: Extract roles from Azure AD "groups" claim
# Without this, Quarkus won't know where to find roles and @RolesAllowed will fail with 403
quarkus.oidc.roles.role-claim-path=groups

# Use "preferred_username" as the principal name (Azure AD username)
# Alternative: use "sub" for the Azure AD user object ID
quarkus.oidc.token.principal-claim=preferred_username

# Token verification settings
quarkus.oidc.token.verify-access-token-with-user-info=false

# Security settings
quarkus.security.auth.enabled-in-dev-mode=true



# Note: JWT dependencies have been removed in favor of OIDC authentication
# All authentication is now handled through Azure AD OIDC configuration above

# ===== Azure AD Group Mapping =====
# Map Azure AD group Object IDs to role names
# Replace the GUIDs below with your actual Azure AD group Object IDs
azure.ad.group.mapping.ROLE_ADMIN=47117f42-c60d-42aa-80f6-f1f02e2da482
azure.ad.group.mapping.ROLE_INVOICE_ADMIN=5bf15c86-c221-4eac-9dfe-92f3778fb4da
azure.ad.group.mapping.ROLE_TEMPLATES_ADMIN=09c7080f-b676-4c39-b6ff-ed3e6c002a1f
azure.ad.group.mapping.ROLE_USER=b5e660fe-89c5-4e9e-9d82-d56fb73246f3
azure.ad.group.mapping.ROLE_READONLY=8afc92da-8ff9-475a-8938-1bea02e0bd27

# ===== Entra user admin (Microsoft Graph) =====
# Tenant authenticating the admin calls (same as the SPA tenant by default).
azure.graph.tenant-id=${AZURE_TENANT_ID:}
# Client ID of the app registration dedicated to backend admin calls.
# The Managed Identity of this Container App is mapped to this client ID
# via a federated credential in the app registration.
azure.graph.client-id=${AZURE_GRAPH_CLIENT_ID:}
# The app registration needs these application permissions with admin consent:
#   User.Read.All, GroupMember.ReadWrite.All, User.Invite.All
azure.graph.invite-redirect-url=${AZURE_GRAPH_INVITE_REDIRECT_URL:https://lively-cliff-098bcde03.7.azurestaticapps.net}
# Disable the whole admin surface in dev if credentials are not set.
azure.graph.enabled=${AZURE_GRAPH_ENABLED:true}
%dev.azure.graph.enabled=false

# ===== Domain configs (adjust names to your collections if different) =====
app.invoice.collection=INVOICE
app.invoice.date-range-years=1
app.bill-of-lading.collection=BillOfLading
app.bill-of-lading.date-range-years=1

# ===== Ask AI (no hard-coded keys) =====
openai.api.key=${OPENAI_API_KEY}
%dev.openai.api.key=${OPENAI_API_KEY}
openai.api.model=gpt-5-nano
quarkus.rest-client.openai.url=https://api.openai.com
quarkus.rest-client.openai.http2=false

# ===== Anthropic / Claude AI =====
anthropic.api.key=${ANTHROPIC_API_KEY:not-configured}
anthropic.api.model=claude-haiku-4-5-20251001
quarkus.rest-client.anthropic.url=https://api.anthropic.com
quarkus.rest-client.anthropic.http2=false
# Inject API key as header
quarkus.rest-client.anthropic.headers.x-api-key=${ANTHROPIC_API_KEY:not-configured}

# ===== AIS / aisstream.io integration =====
app.ais.enabled=${AIS_ENABLED:true}
app.ais.aisstream.url=wss://stream.aisstream.io/v0/stream
app.ais.aisstream.api-key=${AISSTREAM_API_KEY:}
# JSON: [[[lat_SW,lon_SW],[lat_NE,lon_NE]]]. Empty disables filter.
app.ais.bbox=${AIS_BBOX:}
# Comma-separated MMSI list (max 50 per aisstream contract). Empty allowed.
app.ais.mmsi-list=${AIS_MMSI_LIST:}
# Heartbeat scheduler — reconnects if WS disconnected. "off" disables.
app.ais.heartbeat.every=${AIS_HEARTBEAT_EVERY:60s}
%dev.app.ais.enabled=false
%dev.app.ais.heartbeat.every=off

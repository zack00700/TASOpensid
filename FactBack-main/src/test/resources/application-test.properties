# Test profile — overrides production application.properties for tests

# MongoDB DevServices: auto-starts a Docker mongo container for tests
quarkus.mongodb.devservices.enabled=true
quarkus.mongodb.devservices.image-name=mongo:7
quarkus.mongodb.database=testdb

# Disable Caffeine cache so DAO/REST tests see fresh DB state on every read
quarkus.cache.enabled=false

# Pin timezone so date-window tests are deterministic
app.timezone=Europe/Paris

# Silence the noisy Mongo & Quarkus startup output during tests
quarkus.log.category."org.mongodb".level=WARN
quarkus.log.category."io.quarkus.mongodb".level=WARN
